version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - JWT_SECRET=flowforge_secret_key_2024
      - DATABASE_URL=file:./dev.db
    volumes:
      - ./server/prisma:/app/prisma

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - server
